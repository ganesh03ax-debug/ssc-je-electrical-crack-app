<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ CRACK IT — SSC JE Electrical</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#3D63F5;
  --blue-dark:#2C4DE0;
  --blue-light:#EAF0FF;
  --ink:#12172B;
  --ink-soft:#667085;
  --ink-faint:#9AA2B4;
  --bg:#F2F4FA;
  --panel:#FFFFFF;
  --line:#E5E8F0;
  --go:#12A150;
  --go-dark:#0D8A42;
  --go-soft:#E3F8EC;
  --warn:#DD8F00;
  --warn-soft:#FFF3D6;
  --bad:#E23B4E;
  --bad-soft:#FDE7EA;
  --purple:#8B5CF6;
  --purple-soft:#F1EAFE;
  --grad:linear-gradient(120deg, #FF7A33 0%, #FF3D8A 52%, #7C3AED 100%);
  --radius:16px;
  --radius-sm:11px;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',sans-serif;
  --head:'Poppins',sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
#app{max-width:800px; margin:0 auto; padding:18px 16px 60px; width:100%;}
a{color:inherit;}
button{font-family:inherit; cursor:pointer;}
:focus-visible{outline:2px solid var(--blue); outline-offset:2px;}

/* ---------- top navigation bar ---------- */
.topnav{
  background:var(--grad); padding:14px 18px; display:flex; align-items:center;
  justify-content:center; box-shadow:0 4px 18px rgba(124,58,237,.25);
  position:sticky; top:0; z-index:80;
}
.topnav-brand{
  display:flex; align-items:center; gap:9px; background:none; border:none; cursor:pointer; padding:0;
}
.topnav-logo{
  width:32px; height:32px; border-radius:9px; background:rgba(255,255,255,.24);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.topnav-title{
  font-family:var(--head); font-size:14.5px; font-weight:700; color:#fff; letter-spacing:.1px;
  text-shadow:0 1px 4px rgba(0,0,0,.25);
}

/* ---------- top brand strip ---------- */
.hdr{display:flex; align-items:center; gap:10px; padding:2px 2px 12px;}
.brand-mark{
  width:32px;height:32px;border-radius:9px; background:var(--grad); color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono); font-weight:800; font-size:13px;
}
.brand-name{font-family:var(--head); font-size:13.5px; font-weight:700; color:var(--ink);}

/* ---------- hero banner ---------- */
.hero{
  background:var(--grad);
  border-radius:20px; padding:26px 24px 22px; color:#fff; margin-bottom:18px;
  box-shadow:0 14px 30px rgba(124,58,237,.28);
}
.hero h1{font-family:var(--head); font-size:24px; font-weight:700; margin:0 0 6px; letter-spacing:-.2px; text-shadow:0 1px 4px rgba(0,0,0,.25); display:flex; align-items:center; gap:8px;}
.hero-bolt{display:inline-flex; filter:drop-shadow(0 1px 3px rgba(0,0,0,.3));}
.hero p{margin:0 0 16px; font-size:13.5px; color:rgba(255,255,255,.92); font-weight:500; text-shadow:0 1px 3px rgba(0,0,0,.2);}
.hero-pills{display:flex; gap:8px; flex-wrap:wrap;}
.hero-disclaimer{margin:14px 0 0; font-size:10.5px; color:rgba(255,255,255,.82); font-weight:500; line-height:1.5; text-shadow:0 1px 2px rgba(0,0,0,.15);}
.hero-pill{
  background:rgba(0,0,0,.2); border:1px solid rgba(255,255,255,.3);
  border-radius:20px; padding:7px 13px; font-size:12px; font-weight:700; color:#fff;
  display:inline-flex; align-items:center; gap:6px;
}

/* ---------- tabs ---------- */
.tabs-wrap{overflow-x:auto; padding-bottom:2px; margin-bottom:16px; scrollbar-width:thin;}
.tabs{display:flex; gap:8px; width:max-content;}
.tab{
  border:1.5px solid var(--line); background:var(--panel);
  border-radius:20px; padding:8px 16px; font-size:13px; font-weight:700;
  color:var(--ink-soft); white-space:nowrap; flex-shrink:0;
}
.tab.active{border-color:var(--blue); background:var(--blue); color:#fff; box-shadow:0 4px 12px rgba(61,99,245,.3);}

/* ---------- topic list ---------- */
.topic-list{display:flex; flex-direction:column; gap:10px;}
.topic-row{
  display:flex; align-items:center; gap:14px;
  background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
  padding:15px 16px; box-shadow:0 1px 2px rgba(18,23,43,.03);
  transition:box-shadow .15s ease, border-color .15s ease;
}
.topic-row:hover{box-shadow:0 8px 20px rgba(18,23,43,.08); border-color:#D7DEF3;}
.topic-icon{
  width:44px; height:44px; border-radius:12px; flex-shrink:0;
  background:var(--blue-light); display:flex; align-items:center; justify-content:center;
  color:var(--blue);
}
.topic-icon svg{width:23px; height:23px;}
.topic-body{flex:1; min-width:0;}
.topic-title{font-size:15.5px; font-weight:800; margin:0 0 7px; color:var(--ink);}
.topic-tags{display:flex; gap:6px; flex-wrap:wrap; align-items:center;}
.topic-tag{
  display:inline-block; background:var(--blue-light); color:var(--blue-dark);
  font-size:11.5px; font-weight:700; padding:3px 10px; border-radius:20px;
}
.topic-tag.priority-HIGH{background:var(--bad-soft); color:var(--bad);}
.topic-tag.priority-MEDIUM{background:var(--warn-soft); color:var(--warn);}
.topic-tag.priority-LOW{background:var(--go-soft); color:var(--go);}
.topic-tag.note-flag{background:#EDF3FF; color:var(--blue-dark);}
.topic-right{display:flex; flex-direction:column; align-items:flex-end; gap:8px; flex-shrink:0;}
.topic-qn{font-family:var(--mono); font-size:15px; font-weight:800; color:var(--ink); text-align:right; line-height:1.3;}
.topic-qn small{display:block; font-size:9.5px; font-weight:600; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.4px;}
.start-btn{
  background:var(--go); color:#fff; border:none; border-radius:20px;
  padding:9px 16px; font-size:13px; font-weight:800;
  display:inline-flex; align-items:center; gap:6px;
  box-shadow:0 4px 12px rgba(18,161,80,.3);
}
.start-btn:hover{background:var(--go-dark);}
.start-btn.continue{background:var(--panel); color:var(--blue); border:1.5px solid var(--blue); box-shadow:none;}
.start-btn.continue:hover{background:var(--blue-light);}
.start-btn.soon{background:var(--line); color:var(--ink-faint); box-shadow:none;}

.section-label{
  font-family:var(--mono); font-size:11px; letter-spacing:1.2px; text-transform:uppercase;
  font-weight:800; margin:22px 4px 10px;
  background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent;
}

/* ---------- buttons (shared) ---------- */
.btn{
  border:none; border-radius:var(--radius-sm); padding:12px 16px; font-weight:800; font-size:13.5px;
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  transition:transform .1s ease, box-shadow .15s ease, background .15s ease;
}
.btn-primary{background:var(--go); color:#fff; box-shadow:0 6px 16px rgba(18,161,80,.3);}
.btn-primary:hover{background:var(--go-dark);}
.btn-go{background:var(--go); color:#fff; box-shadow:0 6px 16px rgba(18,161,80,.3);}
.btn-go:hover{filter:brightness(.95);}
.btn-ghost{background:var(--panel); border:1.5px solid var(--line); color:var(--ink-soft);}
.btn-ghost:hover{border-color:var(--blue); color:var(--blue);}
.btn-ghost.on{background:var(--purple-soft); border-color:var(--purple); color:var(--purple);}
.btn-block{width:100%;}
.btn:disabled{opacity:.4; cursor:not-allowed; transform:none; box-shadow:none;}

/* ---------- quiz screen (SSC JE CBT style) ---------- */
.exam-bar{
  display:flex; align-items:center; justify-content:space-between;
  background:var(--grad); color:#fff; border-radius:var(--radius-sm);
  padding:11px 16px; margin-bottom:12px; box-shadow:0 8px 20px rgba(124,58,237,.25);
}
.exam-bar .et-name{font-family:var(--head); font-size:12.5px; font-weight:600; opacity:.95; text-shadow:0 1px 3px rgba(0,0,0,.2);}
.exam-bar .et-sub{font-family:var(--mono); font-size:10.5px; color:rgba(255,255,255,.85); margin-top:2px; text-shadow:0 1px 2px rgba(0,0,0,.15);}
.et-right{display:flex; flex-direction:column; align-items:flex-end; gap:5px;}
.mode-badge{
  font-family:var(--mono); font-size:9.5px; font-weight:800; letter-spacing:.4px;
  padding:3px 9px; border-radius:20px; white-space:nowrap;
}
.mode-badge-practice{background:rgba(255,255,255,.22); color:#fff;}
.mode-badge-exam{background:rgba(0,0,0,.22); color:#fff;}
.exam-timer{
  font-family:var(--mono); font-size:20px; font-weight:800; letter-spacing:1px;
  background:rgba(0,0,0,.28); padding:3px 10px; border-radius:8px;
}
.et-green{color:#4ADE80;} .et-yellow{color:#FACC15;} .et-orange{color:#FB923C;} .et-red{color:#F87171;}

/* ---------- mode picker (home screen) ---------- */
.mode-picker{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; margin-bottom:18px;}
.mode-picker-label{font-family:var(--mono); font-size:10.5px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--ink-faint); margin-bottom:10px;}
.mode-options{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.mode-opt{
  text-align:left; background:var(--bg); border:1.5px solid var(--line); border-radius:var(--radius-sm);
  padding:12px 13px; cursor:pointer; transition:border-color .15s ease, background .15s ease;
}
.mode-opt:hover{border-color:var(--blue);}
.mode-opt.active{border-color:var(--blue); background:var(--blue-light); box-shadow:0 0 0 1px var(--blue) inset;}
.mode-opt-title{font-size:13.5px; font-weight:800; color:var(--ink); margin-bottom:3px;}
.mode-opt-sub{font-size:11px; color:var(--ink-soft); line-height:1.4;}
@media (max-width:480px){ .mode-options{grid-template-columns:1fr;} }

.palette-wrap{overflow-x:auto; margin-bottom:14px; padding-bottom:4px;}
.palette{display:flex; gap:6px; width:max-content;}
.pnum{
  width:32px; height:32px; border-radius:8px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:12px; font-weight:800;
  background:var(--panel); border:1.5px solid var(--line); color:var(--ink-soft);
}
.pnum.visited{border-color:var(--bad); color:var(--bad); background:var(--bad-soft);}
.pnum.answered{border-color:var(--go); color:#fff; background:var(--go);}
.pnum.marked{border-color:var(--purple); color:#fff; background:var(--purple);}
.pnum.current{box-shadow:0 0 0 2.5px var(--blue); border-color:var(--blue);}

.legend{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:16px; font-size:10.5px; color:var(--ink-soft); font-weight:600;}
.legend span{display:inline-flex; align-items:center; gap:5px;}
.legend i{width:9px; height:9px; border-radius:3px; display:inline-block;}
.legend b{font-family:var(--mono); font-weight:800; color:var(--ink); margin-left:1px;}

.qcard{background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--blue); border-radius:var(--radius); padding:19px 19px 17px; margin-bottom:14px; box-shadow:0 1px 2px rgba(18,23,43,.03);}
.qtag{
  display:inline-block; font-family:var(--mono); font-size:10.5px; font-weight:800;
  padding:4px 10px; border-radius:20px; margin-bottom:11px; letter-spacing:.3px;
}
.tag-pyq{background:var(--bad-soft); color:var(--bad);}
.tag-concept{background:var(--go-soft); color:var(--go);}
.qtext{font-size:15.5px; font-weight:700; line-height:1.55; margin:0 0 15px; color:var(--ink);}
.qlevel{font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); margin-left:8px; font-weight:700;}

.opts{display:grid; gap:9px;}
.opt{
  display:flex; align-items:center; gap:11px;
  border:1.5px solid var(--line); border-radius:var(--radius-sm); padding:12px 13px;
  background:var(--panel); text-align:left; font-size:14px; font-weight:600; color:var(--ink);
  transition:border-color .12s ease, background .12s ease;
}
.opt:hover:not(.locked){border-color:var(--blue);}
.opt-letter{
  width:26px; height:26px; border-radius:50%; background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:12px; font-weight:800; flex-shrink:0; color:var(--ink-soft);
  border:1.5px solid var(--line);
}
.opt.selected{border-color:var(--blue); background:var(--blue-light);}
.opt.selected .opt-letter{background:var(--blue); color:#fff; border-color:transparent;}
.opt.correct{border-color:var(--go); background:var(--go-soft);}
.opt.correct .opt-letter{background:var(--go); color:#fff; border-color:transparent;}
.opt.wrong{border-color:var(--bad); background:var(--bad-soft);}
.opt.wrong .opt-letter{background:var(--bad); color:#fff; border-color:transparent;}

.exp-box{
  margin-top:15px; padding:14px 15px; background:var(--blue-light); border-left:3px solid var(--blue);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0; font-size:13.5px; line-height:1.6; color:var(--ink);
}
.exp-box b{color:var(--blue-dark); font-family:var(--mono); font-size:11px; letter-spacing:.5px;}

.quiz-actions{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px;}
.quiz-actions-3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:8px;}
.sticky-submit{position:sticky; bottom:10px; margin-top:14px;}
.back-link{font-size:12.5px; color:var(--ink-soft); font-weight:700; background:none; border:none; padding:6px 0; margin-bottom:6px;}
.topic-note{
  display:flex; align-items:flex-start; gap:9px;
  background:var(--blue-light); border:1px solid #C9DAFC; border-radius:var(--radius-sm);
  padding:11px 13px; margin-bottom:14px; font-size:12.5px; line-height:1.55; color:var(--blue-dark);
}
.topic-note-icon{flex-shrink:0; font-size:14px;}

/* ---------- results ---------- */
.score-hero{
  background:var(--grad);
  border-radius:var(--radius); padding:26px 20px; text-align:center; color:#fff; margin-bottom:16px;
  box-shadow:0 14px 30px rgba(124,58,237,.28);
}
.score-hero .big{font-family:var(--mono); font-size:46px; font-weight:800; text-shadow:0 1px 4px rgba(0,0,0,.25);}
.score-hero .sub{font-size:12.5px; color:rgba(255,255,255,.9); margin-top:4px; font-weight:600; text-shadow:0 1px 3px rgba(0,0,0,.2);}
.stat-row{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:16px;}
.stat-box{background:rgba(255,255,255,.14); border-radius:10px; padding:10px 6px;}
.stat-box .n{font-family:var(--mono); font-weight:800; font-size:17px;}
.stat-box .l{font-size:10px; color:rgba(255,255,255,.8); margin-top:2px; font-weight:700; letter-spacing:.3px;}

.panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px; box-shadow:0 1px 2px rgba(18,23,43,.03);}
.panel h3{font-size:12px; text-transform:uppercase; letter-spacing:.6px; font-family:var(--mono); color:var(--ink-faint); margin:0 0 12px; font-weight:800;}
.bar-row{display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:12.5px;}
.bar-row .lbl{width:78px; flex-shrink:0; color:var(--ink-soft); font-weight:600;}
.bar-track{flex:1; height:8px; background:var(--bg); border-radius:4px; overflow:hidden;}
.bar-fill{height:100%; border-radius:4px;}
.bar-row .val{width:36px; text-align:right; font-family:var(--mono); font-size:11.5px; flex-shrink:0;}

.review-item{padding:10px 0; border-top:1px solid var(--line);}
.review-item:first-child{border-top:none;}
.review-q{font-size:13px; font-weight:600; margin:0 0 6px;}
.review-meta{font-size:11.5px; font-family:var(--mono); display:flex; gap:10px; flex-wrap:wrap;}
.review-meta .r-wrong{color:var(--bad);} .review-meta .r-right{color:var(--go);}

.suggest-item{display:flex; gap:10px; padding:9px 0; border-top:1px solid var(--line); font-size:13px;}
.suggest-item:first-child{border-top:none;}
.suggest-dot{width:7px; height:7px; border-radius:50%; margin-top:5px; flex-shrink:0;}

.result-actions{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:6px;}

/* ---------- history ---------- */
.hist-row{display:flex; align-items:center; gap:12px; padding:11px 0; border-top:1px solid var(--line);}
.hist-row:first-child{border-top:none;}
.hist-info{flex:1;}
.hist-topic{font-weight:700; font-size:13.5px;}
.hist-date{font-size:11px; color:var(--ink-soft); font-family:var(--mono);}
.hist-score{font-family:var(--mono); font-weight:800; font-size:16px;}
.spark{width:70px; height:26px;}

.empty-state{text-align:center; padding:40px 20px; color:var(--ink-soft);}
.empty-state .glyph{font-size:30px; margin-bottom:8px;}
.empty-state p{font-size:13px; margin:4px 0 0;}

.footer-note{text-align:center; font-size:11px; color:var(--ink-faint); margin-top:24px; font-family:var(--mono);}
.footer-link{background:none; border:none; padding:0; font:inherit; color:var(--ink-faint); text-decoration:underline; cursor:pointer;}
.footer-link:hover{color:var(--blue);}
</style>
</head>

<header class="topnav">
  <button class="topnav-brand" onclick="STATE.screen='home'; render();">
    <div class="topnav-logo"><svg viewBox="0 0 24 24" width="17" height="17" fill="#fff"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg></div>

<script>
/* ============================================================
   EL() HELPER
   ============================================================ */
function el(tag, attrs, children){
  attrs = attrs || {};
  children = children || [];
  const e = document.createElement(tag);
  for (const k in attrs){
    const v = attrs[k];
    if (v == null) continue;
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.indexOf('on') === 0 && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (typeof v === 'boolean') { if (v) e.setAttribute(k, ''); }
    else e.setAttribute(k, v);
  }
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null || c === false) return;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}

/* ============================================================
   TOPIC ICONS
   ============================================================ */
const SVG_ATTRS = 'fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"';
const TOPIC_ICONS = {
  // Electrical Machines — classic IEC motor symbol (circle + M)
  1: `<svg viewBox="0 0 24 24" ${SVG_ATTRS}><circle cx="12" cy="12" r="9"/><text x="12" y="16.3" text-anchor="middle" font-size="10.5" font-weight="700" fill="currentColor" stroke="none" font-family="Arial">M</text></svg>`,
  // Network Theory — resistor between two circuit nodes
  2: `<svg viewBox="0 0 24 24" ${SVG_ATTRS}><circle cx="3" cy="12" r="1.6" fill="currentColor" stroke="none"/><line x1="4.6" y1="12" x2="7" y2="12"/><path d="M7 12l1.7-3.4 3.3 6.8 3.3-6.8 1.7 3.4"/><line x1="17" y1="12" x2="19.4" y2="12"/><circle cx="21" cy="12" r="1.6" fill="currentColor" stroke="none"/></svg>`,
  // Power Systems — transmission tower / pylon
  3: `<svg viewBox="0 0 24 24" ${SVG_ATTRS}><path d="M12 2L6 22M12 2l6 20M8.3 9.5h7.4M6.8 15.5h10.4"/><circle cx="9" cy="5.5" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="5.5" r="1" fill="currentColor" stroke="none"/></svg>`,
  // Basic Electrical Engg — battery cell
  4: `<svg viewBox="0 0 24 24" ${SVG_ATTRS}><rect x="2" y="8" width="16" height="8" rx="1.5"/><rect x="18" y="10.5" width="3" height="3" fill="currentColor" stroke="none"/><line x1="6.5" y1="8" x2="6.5" y2="16"/><line x1="11" y1="8" x2="11" y2="16"/></svg>`,
  // Measurements — analog meter/gauge with needle
  5: `<svg viewBox="0 0 24 24" ${SVG_ATTRS}><path d="M4 17a8 8 0 0116 0"/><line x1="12" y1="17" x2="16.5" y2="9.5"/><circle cx="12" cy="17" r="1.3" fill="currentColor" stroke="none"/></svg>`,
  // Power Electronics — diode/thyristor symbol

/* ============================================================
   STATE
   ============================================================ */
const LS_KEY = 'sscje_elec_history_v1';
const MODE_KEY = 'sscje_elec_mode_v1';
let STATE = {
  screen: 'home',
  filter: 'All',
  mode: localStorage.getItem(MODE_KEY) || 'practice',   // 'practice' | 'exam'
  topic: null,
  questions: [],
  idx: 0,
  answers: [],      // {selected, correct, timeSec, checked, visited, marked}
  qStartTime: null,
  timerHandle: null,
  elapsedSec: 0
};
function setMode(m){ STATE.mode = m; localStorage.setItem(MODE_KEY, m); render(); }

function loadHistory(){
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch(e){ return []; }
}
function saveHistoryEntry(entry){
  const h = loadHistory();
  h.push(entry);
  localStorage.setItem(LS_KEY, JSON.stringify(h.slice(-100)));
}
function topicAttempted(topicId){
  return loadHistory().some(h => h.topicId === topicId);
}

function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ============================================================
   RENDER ROOT
   ============================================================ */
function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  if (STATE.screen === 'home') app.appendChild(HomeScreen());
  else if (STATE.screen === 'quiz') app.appendChild(QuizScreen());
  else if (STATE.screen === 'results') app.appendChild(ResultsScreen());
  else if (STATE.screen === 'history') app.appendChild(HistoryScreen());
  else if (STATE.screen === 'about') app.appendChild(AboutScreen());
  const footer = el('div', {class:'footer-note'}, [
    '⚡ CRACK IT — SSC JE Electrical · "The exam doesn\'t test knowledge — it tests preparation." · ',
    el('button', {class:'footer-link', onClick:() => { STATE.screen='about'; render(); }}, 'About')
  ]);
  app.appendChild(footer);
}

function startTopic(topic){
  const bank = QUESTION_BANK[topic.id] || [];
  if (!bank.length) return;
  STATE.topic = topic;
  STATE.questions = shuffle(bank);
  STATE.idx = 0;
  STATE.answers = bank.map(() => ({selected:null, correct:false, timeSec:0, checked:false, visited:false, marked:false}));
  STATE.answers[0].visited = true;
  STATE.screen = 'quiz';
  render();
  startQuestionTimer();
}

/* ============================================================
   QUIZ SCREEN (SSC JE CBT style)
   ============================================================ */
function startQuestionTimer(){
  clearInterval(STATE.timerHandle);
  STATE.qStartTime = Date.now();
  STATE.elapsedSec = 0;
  STATE.timerHandle = setInterval(() => {
    STATE.elapsedSec = Math.floor((Date.now() - STATE.qStartTime) / 1000);
    const readout = document.getElementById('exam-timer-digits');
    if (readout){
      readout.textContent = fmtTime(STATE.elapsedSec);
      readout.className = 'exam-timer ' + timerColorClass(STATE.elapsedSec);
    }
  }, 1000);
}
function fmtTime(s){
  const m = Math.floor(s/60), sec = s%60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}
function timerColorClass(s){
  if (s <= 30) return 'et-green';
  if (s <= 60) return 'et-yellow';
  if (s <= 90) return 'et-orange';
  return 'et-red';
}

function jumpToQuestion(i){
  if (i < 0 || i >= STATE.questions.length) return;
  // Auto-save an unsaved exam-mode selection before navigating away, so it isn't lost.
  if (STATE.mode === 'exam'){
    const cur = STATE.answers[STATE.idx];
    if (cur && !cur.checked && cur.selected != null){
      const curQ = STATE.questions[STATE.idx];
      cur.checked = true;
      cur.correct = (cur.selected === curQ.ans);
      cur.timeSec = STATE.elapsedSec;
    }
  }
  clearInterval(STATE.timerHandle);
  STATE.idx = i;
  STATE.answers[i].visited = true;
  render();
  if (!STATE.answers[i].checked){
    startQuestionTimer();
  } else {
    STATE.elapsedSec = STATE.answers[i].timeSec;
  }
}

function QuizScreen(){
  const q = STATE.questions[STATE.idx];
  const a = STATE.answers[STATE.idx];
  const displaySec = a.checked ? a.timeSec : STATE.elapsedSec;
  const wrap = el('div', {});

  wrap.appendChild(el('button', {class:'back-link', onClick:() => { clearInterval(STATE.timerHandle); STATE.screen='home'; render(); }}, '← Exit topic'));

  if (STATE.topic.note){
    wrap.appendChild(el('div', {class:'topic-note'}, [
      el('span', {class:'topic-note-icon'}, '📌'),
      el('span', {}, STATE.topic.note)
    ]));
  }

  wrap.appendChild(el('div', {class:'exam-bar'}, [
    el('div', {}, [
      el('div', {class:'et-name'}, STATE.topic.name.toUpperCase()),
      el('div', {class:'et-sub'}, 'Question ' + (STATE.idx+1) + ' of ' + STATE.questions.length)
    ]),
    el('div', {class:'et-right'}, [
      el('span', {class:'mode-badge mode-badge-' + STATE.mode}, STATE.mode === 'exam' ? '🕐 Exam Mode' : '🎯 Practice Mode'),
      el('div', {id:'exam-timer-digits', class:'exam-timer ' + timerColorClass(displaySec)}, fmtTime(displaySec))
    ])
  ]));

  // question navigator palette
  const palWrap = el('div', {class:'palette-wrap'});
  const pal = el('div', {class:'palette'});
  const counts = { answered:0, visited:0, marked:0, notVisited:0 };
  STATE.questions.forEach((_, i) => {
    const ai = STATE.answers[i];
    let cls = 'pnum';
    if (ai.marked) { cls += ' marked'; counts.marked++; }
    else if (ai.checked) { cls += ' answered'; counts.answered++; }
    else if (ai.visited) { cls += ' visited'; counts.visited++; }
    else { counts.notVisited++; }
    if (i === STATE.idx) cls += ' current';
    pal.appendChild(el('button', {class:cls, onClick:() => jumpToQuestion(i)}, String(i+1)));
  });
  palWrap.appendChild(pal);
  wrap.appendChild(palWrap);

  wrap.appendChild(el('div', {class:'legend'}, [
    el('span', {}, [el('i', {style:'background:var(--go)'}), 'Answered', el('b',{},'('+counts.answered+')')]),
    el('span', {}, [el('i', {style:'background:var(--bad-soft);border:1.5px solid var(--bad)'}), 'Visited, not answered', el('b',{},'('+counts.visited+')')]),
    el('span', {}, [el('i', {style:'background:var(--purple)'}), 'Marked for review', el('b',{},'('+counts.marked+')')]),
    el('span', {}, [el('i', {style:'background:var(--panel);border:1.5px solid var(--line)'}), 'Not visited', el('b',{},'('+counts.notVisited+')')])
  ]));

  const qcard = el('div', {class:'qcard'});
  qcard.appendChild(el('span', {class:'qtag ' + (q.tag.indexOf('PYQ')>-1 ? 'tag-pyq':'tag-concept')}, q.tag));
  qcard.appendChild(el('span', {class:'qlevel'}, q.level));
  qcard.appendChild(el('p', {class:'qtext'}, (STATE.idx+1) + '. ' + q.q));

  // In Exam Mode, correctness is never revealed mid-quiz — only after final submission.
  const reveal = STATE.mode === 'practice' && a.checked;
  const locked = STATE.mode === 'practice' && a.checked; // practice locks the question once checked; exam stays editable until submit

  const optsWrap = el('div', {class:'opts'});
  q.opts.forEach((optText, i) => {
    const letter = 'ABCD'[i];
    let cls = 'opt';
    if (reveal){
      cls += ' locked';
      if (i === q.ans) cls += ' correct';
      else if (i === a.selected) cls += ' wrong';
    } else if (a.selected === i){
      cls += ' selected';
    }
    optsWrap.appendChild(el('button', {
      class: cls,
      onClick: () => { if (!locked){ a.selected = i; render(); } }
    }, [
      el('span', {class:'opt-letter'}, letter),
      el('span', {}, optText)
    ]));
  });
  qcard.appendChild(optsWrap);

  if (reveal){
    qcard.appendChild(el('div', {class:'exp-box'}, [
      el('b', {}, a.selected === q.ans ? '✓ CORRECT — EXPLANATION' : '✕ WRONG — EXPLANATION'),
      el('p', {style:'margin:6px 0 0;'}, q.exp)
    ]));
  }
  wrap.appendChild(qcard);

  if (STATE.mode === 'exam'){
    const actions3 = el('div', {class:'quiz-actions-3'});
    actions3.appendChild(el('button', {
      class:'btn btn-ghost', disabled: STATE.idx===0, onClick:() => jumpToQuestion(STATE.idx-1)
    }, '◀ Previous'));
    actions3.appendChild(el('button', {
      class:'btn btn-ghost' + (a.marked ? ' on' : ''), onClick:() => examMarkForReviewNext()
    }, '🚩 Mark for Review & Next'));
    actions3.appendChild(el('button', {
      class:'btn btn-ghost', disabled: a.selected==null, onClick:() => examClearResponse()
    }, 'Clear Response'));
    wrap.appendChild(actions3);
    wrap.appendChild(el('button', {
      class:'btn btn-primary btn-block', onClick:() => examSaveNext()
    }, STATE.idx === STATE.questions.length - 1 ? 'Save & Finish' : 'Save & Next ▶'));
  } else if (!a.checked){
    const actions2pre = el('div', {class:'quiz-actions'});
    actions2pre.appendChild(el('button', {
      class:'btn btn-ghost', disabled: STATE.idx===0, onClick:() => jumpToQuestion(STATE.idx-1)
    }, '◀ Previous'));
    actions2pre.appendChild(el('button', {
      class:'btn btn-primary', disabled: a.selected==null, onClick:() => checkAnswer()
    }, 'Check answer'));
    wrap.appendChild(actions2pre);
  } else {
    const actions2 = el('div', {class:'quiz-actions'});
    actions2.appendChild(el('button', {
      class:'btn btn-ghost', disabled: STATE.idx===0, onClick:() => jumpToQuestion(STATE.idx-1)
    }, '◀ Previous'));
    actions2.appendChild(el('button', {
      class:'btn btn-go', onClick:() => nextQuestion()
    }, STATE.idx === STATE.questions.length - 1 ? 'Finish topic' : 'Save & Next ▶'));
    wrap.appendChild(actions2);
  }

  const answeredCount = STATE.answers.filter(x => x.checked).length;
  if (answeredCount > 0){
    wrap.appendChild(el('div', {class:'sticky-submit'},
      el('button', {class:'btn btn-primary btn-block', onClick:() => finishTopic()},
        'Submit & see results  (' + answeredCount + '/' + STATE.questions.length + ' attempted)')
    ));
  }

  return wrap;
}

function checkAnswer(){
  const q = STATE.questions[STATE.idx];
  const a = STATE.answers[STATE.idx];
  a.checked = true;
  a.correct = (a.selected === q.ans);
  a.timeSec = STATE.elapsedSec;
  clearInterval(STATE.timerHandle);
  render();
}

/* Exam-mode actions: never reveal correctness mid-quiz; just save + advance */
function examSaveNext(){
  const q = STATE.questions[STATE.idx];
  const a = STATE.answers[STATE.idx];
  if (a.selected != null){
    a.checked = true;
    a.correct = (a.selected === q.ans);
    a.timeSec = STATE.elapsedSec;
  }
  nextQuestion();
}
function examMarkForReviewNext(){
  const q = STATE.questions[STATE.idx];
  const a = STATE.answers[STATE.idx];
  a.marked = true;
  if (a.selected != null){
    a.checked = true;
    a.correct = (a.selected === q.ans);
    a.timeSec = STATE.elapsedSec;
  }
  nextQuestion();
}
function examClearResponse(){
  const a = STATE.answers[STATE.idx];
  a.selected = null;
  a.checked = false;
  render();
  startQuestionTimer();
}

function nextQuestion(){
  if (STATE.idx < STATE.questions.length - 1){
    jumpToQuestion(STATE.idx + 1);
  } else {
    finishTopic();
  }
}

function finishTopic(){
  clearInterval(STATE.timerHandle);
  const attempted = STATE.answers.filter(a => a.checked);
  const correct = attempted.filter(a => a.correct).length;
  const wrong = attempted.length - correct;
  const marks = (correct * 1) - (wrong * 0.25);

  const byLevel = {Easy:{c:0,t:0}, Medium:{c:0,t:0}, Hard:{c:0,t:0}};
  const byTag = {PYQ:{c:0,t:0}, CONCEPT:{c:0,t:0}};
  STATE.questions.forEach((q,i) => {
    const a = STATE.answers[i];
    if (!a.checked) return;
    byLevel[q.level].t++; if (a.correct) byLevel[q.level].c++;
    const key = q.tag.indexOf('PYQ')>-1 ? 'PYQ' : 'CONCEPT';
    byTag[key].t++; if (a.correct) byTag[key].c++;
  });

  const entry = {
    topicId: STATE.topic.id,
    topicName: STATE.topic.name,
    date: new Date().toISOString(),
    attempted: attempted.length,
    total: STATE.questions.length,
    correct, wrong, marks,
    accuracy: attempted.length ? Math.round((correct/attempted.length)*100) : 0,
    byLevel, byTag,
    avgTime: attempted.length ? Math.round(attempted.reduce((s,a)=>s+a.timeSec,0)/attempted.length) : 0
  };
  saveHistoryEntry(entry);
  STATE._lastResult = entry;
  STATE.screen = 'results';
  render();
}

  }

  const actions = el('div', {class:'result-actions'});
  actions.appendChild(el('button', {class:'btn btn-ghost', onClick:() => startTopic(STATE.topic)}, 'Retry'));
  actions.appendChild(el('button', {class:'btn btn-ghost', onClick:() => { STATE.screen='home'; render(); }}, 'New topic'));
  actions.appendChild(el('button', {class:'btn btn-primary', onClick:() => { STATE.screen='history'; render(); }}, 'History'));
  wrap.appendChild(actions);

  return wrap;
}

function SuggestionsPanel(r){
  const suggestions = [];
  if (r.accuracy < 50) suggestions.push({c:'var(--bad)', t:'Accuracy below 50% — re-read the concept notes for ' + r.topicName + ' before attempting more questions.'});
  else if (r.accuracy < 75) suggestions.push({c:'var(--warn)', t:'Decent grip, but push accuracy above 75% by revisiting the questions you got wrong.'});
  else suggestions.push({c:'var(--go)', t:'Strong accuracy (' + r.accuracy + '%) — you\'re ready to move to the next high-yield topic.'});
  if (r.avgTime > 75) suggestions.push({c:'var(--bad)', t:'Average ' + r.avgTime + 's/question is too slow for a 2-hour, 200-question paper — drill formulas until recall is instant.'});
  else if (r.avgTime > 50) suggestions.push({c:'var(--warn)', t:'Speed is acceptable but tighten it — aim for under 50s/question with practice.'});
  else suggestions.push({c:'var(--go)', t:'Excellent pace at ' + r.avgTime + 's/question — well within exam timing limits.'});
  const hard = r.byLevel.Hard;
  if (hard.t && (hard.c/hard.t) < 0.5) suggestions.push({c:'var(--warn)', t:'Hard numericals are your weak spot here — practice the derivation steps, not just the final formula.'});
  const pyq = r.byTag.PYQ;
  if (pyq.t && (pyq.c/pyq.t) < 0.6) suggestions.push({c:'var(--bad)', t:'You missed several PYQ-pattern questions — these repeat almost every year, so revise these first.'});
  if (r.attempted < r.total) suggestions.push({c:'var(--warn)', t:'You left ' + (r.total-r.attempted) + ' question(s) unattempted — come back and finish the full set for a true score.'});
  else suggestions.push({c:'var(--go)', t:'Full set attempted — this score is a true reading of your readiness on this topic.'});

  const panel = el('div', {class:'panel'});
  panel.appendChild(el('h3', {}, 'Smart suggestions'));
  suggestions.forEach(s => {
    panel.appendChild(el('div', {class:'suggest-item'}, [
      el('span', {class:'suggest-dot', style:'background:'+s.c}),
      el('span', {}, s.t)
    ]));
  });
  return panel;
}

/* ============================================================
   HISTORY SCREEN
   ============================================================ */
function HistoryScreen(){
  const wrap = el('div', {});
  wrap.appendChild(el('button', {class:'back-link', onClick:() => { STATE.screen='home'; render(); }}, '← Back to topics'));
  wrap.appendChild(el('div', {class:'section-label'}, 'Performance history'));

  const hist = loadHistory().slice().reverse();
  if (!hist.length){
    wrap.appendChild(el('div', {class:'empty-state'}, [
      el('div', {class:'glyph'}, '📈'),
      el('p', {}, 'No attempts yet. Finish a topic to see your trend here.')
    ]));
    return wrap;
  }

  const panel = el('div', {class:'panel'});
  hist.slice(0, 30).forEach(h => {
    const d = new Date(h.date);
    panel.appendChild(el('div', {class:'hist-row'}, [
      el('div', {class:'hist-info'}, [
        el('div', {class:'hist-topic'}, h.topicName),
        el('div', {class:'hist-date'}, d.toLocaleDateString() + ' · ' + h.correct + '/' + h.attempted + ' correct · ' + h.accuracy + '%')
      ]),
      Sparkline(h.topicId),
      el('div', {class:'hist-score', style:'color:'+(h.accuracy>=75?'var(--go)':h.accuracy>=50?'var(--warn)':'var(--bad)')}, h.marks.toFixed(1))
    ]));
  });
  wrap.appendChild(panel);
  return wrap;
}

function Sparkline(topicId){
  const points = loadHistory().filter(h => h.topicId === topicId).map(h => h.accuracy);
  if (points.length < 2) return el('span', {style:'width:70px;display:inline-block;'});
  const w = 70, h = 26, max = 100, min = 0;
  const step = w / (points.length - 1);
  const path = points.map((p,i) => (i*step) + ',' + (h - ((p-min)/(max-min))*h)).join(' ');
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 '+w+' '+h);
  svg.setAttribute('class','spark');
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polyline');
  poly.setAttribute('points', path);
  poly.setAttribute('fill','none');
  poly.setAttribute('stroke','var(--blue)');
  poly.setAttribute('stroke-width','2');
  poly.setAttribute('stroke-linecap','round');
  poly.setAttribute('stroke-linejoin','round');
  svg.appendChild(poly);
  return svg;
}
