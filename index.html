<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSC JE Electrical — CRACK APP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16202B;
  --ink-soft:#4A5568;
  --canvas:#F1EFE9;
  --panel:#FFFFFF;
  --line:#DAD5C9;
  --copper:#C97A2B;
  --copper-dark:#A55F1B;
  --go:#2F8F5B;
  --go-soft:#E4F3EA;
  --warn:#D99A28;
  --warn-soft:#FBF0DC;
  --bad:#C0392B;
  --bad-soft:#FBE7E4;
  --hi:#8B3A9E;
  --radius:10px;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--sans);
  background:var(--canvas);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:"";
  position:fixed; inset:0;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size:28px 28px;
  opacity:.35;
  pointer-events:none;
  z-index:0;
}
#app{position:relative; z-index:1; max-width:760px; margin:0 auto; padding:16px 16px 60px;}
a{color:inherit;}
button{font-family:inherit; cursor:pointer;}
:focus-visible{outline:2px solid var(--copper); outline-offset:2px;}

/* ---------- header ---------- */
.hdr{display:flex; align-items:center; justify-content:space-between; padding:14px 4px 18px;}
.brand{display:flex; align-items:center; gap:10px;}
.brand-mark{
  width:38px;height:38px;border-radius:9px;
  background:var(--ink); color:var(--copper);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono); font-weight:800; font-size:15px;
  box-shadow:0 2px 0 var(--copper);
}
.brand h1{font-size:15.5px; font-weight:800; margin:0; letter-spacing:.2px; line-height:1.15;}
.brand p{margin:0; font-size:11px; color:var(--ink-soft); font-family:var(--mono);}
.neg-badge{
  font-family:var(--mono); font-size:11px; font-weight:700;
  background:var(--bad-soft); color:var(--bad);
  border:1px solid var(--bad); border-radius:20px;
  padding:5px 10px;
}

/* ---------- home ---------- */
.filters{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
.chip{
  border:1.5px solid var(--line); background:var(--panel);
  border-radius:20px; padding:7px 14px; font-size:13px; font-weight:600;
  color:var(--ink-soft);
}
.chip.active{border-color:var(--ink); background:var(--ink); color:#fff;}

.section-label{
  font-family:var(--mono); font-size:11px; letter-spacing:1px; text-transform:uppercase;
  color:var(--copper-dark); font-weight:700; margin:20px 4px 8px;
}

.topic-grid{display:grid; gap:10px;}
.topic-card{
  display:flex; align-items:center; gap:12px;
  background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
  padding:13px 14px; position:relative; overflow:hidden;
  transition:transform .1s ease, box-shadow .15s ease;
}
.topic-card:not(.empty):hover{transform:translateY(-1px); box-shadow:0 4px 14px rgba(22,32,43,.08);}
.topic-card.empty{opacity:.55; cursor:default;}
.topic-rail{width:4px; align-self:stretch; border-radius:3px; flex-shrink:0;}
.rail-HIGH{background:var(--bad);}
.rail-MEDIUM{background:var(--warn);}
.rail-LOW{background:var(--ink-soft);}
.topic-main{flex:1; min-width:0;}
.topic-name{font-weight:700; font-size:14.5px; margin:0 0 3px;}
.topic-meta{font-size:11.5px; color:var(--ink-soft); font-family:var(--mono);}
.topic-badge{
  font-family:var(--mono); font-size:12px; font-weight:700; text-align:right; flex-shrink:0;
  color:var(--ink);
}
.topic-badge small{display:block; font-size:9px; color:var(--ink-soft); font-weight:500;}
.priority-tag{
  font-size:9.5px; font-weight:800; font-family:var(--mono); letter-spacing:.5px;
  padding:2px 6px; border-radius:4px; margin-left:8px; flex-shrink:0;
}
.pt-HIGH{background:var(--bad-soft); color:var(--bad);}
.pt-MEDIUM{background:var(--warn-soft); color:var(--warn);}
.pt-LOW{background:#EDEBE4; color:var(--ink-soft);}

/* ---------- buttons ---------- */
.btn{
  border:none; border-radius:8px; padding:11px 18px; font-weight:700; font-size:13.5px;
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
}
.btn-primary{background:var(--ink); color:#fff;}
.btn-primary:hover{background:#0d151e;}
.btn-copper{background:var(--copper); color:#fff;}
.btn-copper:hover{background:var(--copper-dark);}
.btn-ghost{background:transparent; border:1.5px solid var(--line); color:var(--ink);}
.btn-block{width:100%;}
.btn:disabled{opacity:.4; cursor:not-allowed;}

/* ---------- quiz screen ---------- */
.quiz-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
.back-link{font-size:12.5px; color:var(--ink-soft); font-weight:600; background:none; border:none; padding:6px 0;}
.progress-track{height:5px; background:var(--line); border-radius:3px; overflow:hidden; margin-bottom:16px;}
.progress-fill{height:100%; background:var(--copper); transition:width .2s ease;}

.readout-wrap{
  display:flex; align-items:center; justify-content:space-between;
  background:var(--ink); border-radius:var(--radius); padding:10px 16px; margin-bottom:14px;
}
.readout-label{font-family:var(--mono); font-size:10px; color:#8a97a6; letter-spacing:1px; text-transform:uppercase;}
.readout-digits{
  font-family:var(--mono); font-size:26px; font-weight:700; letter-spacing:1px;
  transition:color .25s ease;
}
.rd-green{color:#4ADE80;} .rd-yellow{color:#FACC15;} .rd-orange{color:#FB923C;} .rd-red{color:#F87171;}
.readout-qcount{font-family:var(--mono); font-size:12px; color:#c7cfd8; text-align:right;}

.qcard{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:18px 18px 16px; margin-bottom:14px;}
.qtag{
  display:inline-block; font-family:var(--mono); font-size:10.5px; font-weight:700;
  padding:3px 8px; border-radius:5px; margin-bottom:10px;
}
.tag-pyq{background:var(--bad-soft); color:var(--bad);}
.tag-concept{background:var(--go-soft); color:var(--go);}
.qtext{font-size:15.5px; font-weight:600; line-height:1.5; margin:0 0 14px;}
.qlevel{font-family:var(--mono); font-size:10.5px; color:var(--ink-soft); margin-left:8px;}

.opts{display:grid; gap:8px;}
.opt{
  display:flex; align-items:center; gap:10px;
  border:1.5px solid var(--line); border-radius:8px; padding:11px 12px;
  background:var(--panel); text-align:left; font-size:14px; font-weight:500;
}
.opt:hover:not(.locked){border-color:var(--copper);}
.opt-letter{
  width:24px; height:24px; border-radius:6px; background:var(--canvas);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--mono); font-size:12px; font-weight:700; flex-shrink:0;
}
.opt.selected{border-color:var(--ink); background:#F7F6F2;}
.opt.correct{border-color:var(--go); background:var(--go-soft);}
.opt.correct .opt-letter{background:var(--go); color:#fff;}
.opt.wrong{border-color:var(--bad); background:var(--bad-soft);}
.opt.wrong .opt-letter{background:var(--bad); color:#fff;}

.exp-box{
  margin-top:14px; padding:13px 14px; background:var(--canvas); border-left:3px solid var(--copper);
  border-radius:0 8px 8px 0; font-size:13.5px; line-height:1.55; color:var(--ink);
}
.exp-box b{color:var(--copper-dark); font-family:var(--mono); font-size:11px; letter-spacing:.5px;}

.quiz-actions{display:flex; gap:10px; margin-bottom:8px;}
.sticky-submit{
  position:sticky; bottom:10px; margin-top:14px;
}

/* ---------- results ---------- */
.score-hero{
  background:var(--ink); border-radius:var(--radius); padding:24px 20px; text-align:center; color:#fff; margin-bottom:16px;
}
.score-hero .big{font-family:var(--mono); font-size:44px; font-weight:800; color:var(--copper);}
.score-hero .sub{font-size:12.5px; color:#c7cfd8; margin-top:4px;}
.stat-row{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:16px;}
.stat-box{background:rgba(255,255,255,.06); border-radius:8px; padding:10px 6px;}
.stat-box .n{font-family:var(--mono); font-weight:700; font-size:16px;}
.stat-box .l{font-size:10px; color:#a7b0bb; margin-top:2px;}

.panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px;}
.panel h3{font-size:12px; text-transform:uppercase; letter-spacing:.6px; font-family:var(--mono); color:var(--copper-dark); margin:0 0 12px;}
.bar-row{display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:12.5px;}
.bar-row .lbl{width:78px; flex-shrink:0; color:var(--ink-soft); font-weight:600;}
.bar-track{flex:1; height:8px; background:var(--canvas); border-radius:4px; overflow:hidden;}
.bar-fill{height:100%; border-radius:4px;}
.bar-row .val{width:36px; text-align:right; font-family:var(--mono); font-size:11.5px; flex-shrink:0;}

.review-item{padding:10px 0; border-top:1px solid var(--line);}
.review-item:first-child{border-top:none;}
.review-q{font-size:13px; font-weight:600; margin:0 0 6px;}
.review-meta{font-size:11.5px; font-family:var(--mono); display:flex; gap:10px; flex-wrap:wrap;}
.review-meta .r-wrong{color:var(--bad);} .review-meta .r-right{color:var(--go);}

.suggest-item{display:flex; gap:10px; padding:9px 0; border-top:1px solid var(--line); font-size:13px;}
.suggest-item:first-child{border-top:none;}
.suggest-dot{width:7px; height:7px; border-radius:50%; margin-top:5px; flex-shrink:0;}

.result-actions{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:6px;}

/* ---------- history ---------- */
.hist-row{display:flex; align-items:center; gap:12px; padding:11px 0; border-top:1px solid var(--line);}
.hist-row:first-child{border-top:none;}
.hist-info{flex:1;}
.hist-topic{font-weight:700; font-size:13.5px;}
.hist-date{font-size:11px; color:var(--ink-soft); font-family:var(--mono);}
.hist-score{font-family:var(--mono); font-weight:800; font-size:16px;}
.spark{width:70px; height:26px;}

.empty-state{text-align:center; padding:40px 20px; color:var(--ink-soft);}
.empty-state .glyph{font-size:30px; margin-bottom:8px;}
.empty-state p{font-size:13px; margin:4px 0 0;}

.footer-note{text-align:center; font-size:11px; color:var(--ink-soft); margin-top:24px; font-family:var(--mono);}
</style>
</head>
<body>
<div id="app"></div>

<script src="questions.js"></script>
<script>
/* ============================================================
   EL() HELPER
   ============================================================ */
function el(tag, attrs, children){
  attrs = attrs || {};
  children = children || [];
  const e = document.createElement(tag);
  for (const k in attrs){
    const v = attrs[k];
    if (v == null) continue;
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.indexOf('on') === 0 && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null || c === false) return;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  });
  return e;
}

/* ============================================================
   STATE
   ============================================================ */
const LS_KEY = 'sscje_elec_history_v1';
let STATE = {
  screen: 'home',
  filter: 'All',
  topic: null,
  questions: [],
  idx: 0,
  answers: [],      // {selected, correct, timeSec, checked}
  qStartTime: null,
  timerHandle: null,
  elapsedSec: 0
};

function loadHistory(){
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch(e){ return []; }
}
function saveHistoryEntry(entry){
  const h = loadHistory();
  h.push(entry);
  localStorage.setItem(LS_KEY, JSON.stringify(h.slice(-100)));
}

function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ============================================================
   RENDER ROOT
   ============================================================ */
function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(Header());
  if (STATE.screen === 'home') app.appendChild(HomeScreen());
  else if (STATE.screen === 'quiz') app.appendChild(QuizScreen());
  else if (STATE.screen === 'results') app.appendChild(ResultsScreen());
  else if (STATE.screen === 'history') app.appendChild(HistoryScreen());
  app.appendChild(el('div', {class:'footer-note'}, '⚡ SSC JE Electrical CRACK APP — built for 2027 aspirants'));
}

function Header(){
  return el('div', {class:'hdr'}, [
    el('div', {class:'brand'}, [
      el('div', {class:'brand-mark'}, 'JE'),
      el('div', {}, [
        el('h1', {}, 'SSC JE Electrical'),
        el('p', {}, 'CRACK APP · 1032Q TARGET')
      ])
    ]),
    el('div', {class:'neg-badge'}, '−0.25 / wrong')
  ]);
}

/* ============================================================
   HOME SCREEN
   ============================================================ */
function HomeScreen(){
  const wrap = el('div', {});
  const cats = ['All','Technical','Non-Technical'];
  wrap.appendChild(el('div', {class:'filters'},
    cats.map(c => el('button', {
      class:'chip' + (STATE.filter===c?' active':''),
      onClick:() => { STATE.filter = c; render(); }
    }, c))
  ));

  wrap.appendChild(el('div', {class:'section-label'}, 'Choose a topic'));

  const list = TOPICS.filter(t => STATE.filter==='All' || t.category===STATE.filter);
  const grid = el('div', {class:'topic-grid'});
  list.forEach(t => {
    const loaded = (QUESTION_BANK[t.id] || []).length;
    const empty = loaded === 0;
    grid.appendChild(el('div', {
      class:'topic-card' + (empty ? ' empty' : ''),
      onClick: empty ? null : () => startTopic(t)
    }, [
      el('div', {class:'topic-rail rail-'+t.priority}),
      el('div', {class:'topic-main'}, [
        el('p', {class:'topic-name'}, t.name),
        el('p', {class:'topic-meta'}, empty ? 'coming in next build session' : loaded + ' questions ready')
      ]),
      el('div', {class:'topic-badge'}, [
        String(loaded) + '/' + t.target,
        el('small', {}, 'Q LOADED')
      ]),
      el('span', {class:'priority-tag pt-'+t.priority}, t.priority)
    ]));
  });
  wrap.appendChild(grid);

  wrap.appendChild(el('div', {style:'margin-top:18px;'},
    el('button', {class:'btn btn-ghost btn-block', onClick:() => { STATE.screen='history'; render(); }}, '📊 View performance history')
  ));

  return wrap;
}

function startTopic(topic){
  const bank = QUESTION_BANK[topic.id] || [];
  if (!bank.length) return;
  STATE.topic = topic;
  STATE.questions = shuffle(bank);
  STATE.idx = 0;
  STATE.answers = bank.map(() => ({selected:null, correct:false, timeSec:0, checked:false}));
  STATE.screen = 'quiz';
  render();
  startQuestionTimer();
}

/* ============================================================
   QUIZ SCREEN
   ============================================================ */
function startQuestionTimer(){
  clearInterval(STATE.timerHandle);
  STATE.qStartTime = Date.now();
  STATE.elapsedSec = 0;
  STATE.timerHandle = setInterval(() => {
    STATE.elapsedSec = Math.floor((Date.now() - STATE.qStartTime) / 1000);
    const readout = document.getElementById('readout-digits');
    if (readout){
      readout.textContent = fmtTime(STATE.elapsedSec);
      readout.className = 'readout-digits ' + timerColorClass(STATE.elapsedSec);
    }
  }, 1000);
}
function stopQuestionTimer(){
  clearInterval(STATE.timerHandle);
  const a = STATE.answers[STATE.idx];
  if (a && !a.checked) a.timeSec = STATE.elapsedSec;
}
function fmtTime(s){
  const m = Math.floor(s/60), sec = s%60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}
function timerColorClass(s){
  if (s <= 30) return 'rd-green';
  if (s <= 60) return 'rd-yellow';
  if (s <= 90) return 'rd-orange';
  return 'rd-red';
}

function QuizScreen(){
  const q = STATE.questions[STATE.idx];
  const a = STATE.answers[STATE.idx];
  const wrap = el('div', {});

  wrap.appendChild(el('div', {class:'quiz-top'}, [
    el('button', {class:'back-link', onClick:() => { clearInterval(STATE.timerHandle); STATE.screen='home'; render(); }}, '← Exit topic'),
    el('span', {style:'font-family:var(--mono);font-size:12px;color:var(--ink-soft);'}, (STATE.idx+1)+' / '+STATE.questions.length)
  ]));

  wrap.appendChild(el('div', {class:'progress-track'},
    el('div', {class:'progress-fill', style:'width:'+((STATE.idx)/STATE.questions.length*100)+'%'})
  ));

  wrap.appendChild(el('div', {class:'readout-wrap'}, [
    el('div', {}, [
      el('div', {class:'readout-label'}, 'Time on this question'),
      el('div', {id:'readout-digits', class:'readout-digits '+timerColorClass(STATE.elapsedSec)}, fmtTime(STATE.elapsedSec))
    ]),
    el('div', {class:'readout-qcount'}, [STATE.topic.name.toUpperCase(), el('br'), '≤30s ▸ ≤60s ▸ ≤90s ▸ >90s']),
  ]));

  const qcard = el('div', {class:'qcard'});
  qcard.appendChild(el('span', {class:'qtag ' + (q.tag.indexOf('PYQ')>-1 ? 'tag-pyq':'tag-concept')}, q.tag));
  qcard.appendChild(el('span', {class:'qlevel'}, q.level));
  qcard.appendChild(el('p', {class:'qtext'}, q.q));

  const optsWrap = el('div', {class:'opts'});
  q.opts.forEach((optText, i) => {
    const letter = 'ABCD'[i];
    let cls = 'opt';
    if (a.checked){
      cls += ' locked';
      if (i === q.ans) cls += ' correct';
      else if (i === a.selected) cls += ' wrong';
    } else if (a.selected === i){
      cls += ' selected';
    }
    optsWrap.appendChild(el('button', {
      class: cls,
      onClick: () => { if (!a.checked){ a.selected = i; render(); } }
    }, [
      el('span', {class:'opt-letter'}, letter),
      el('span', {}, optText)
    ]));
  });
  qcard.appendChild(optsWrap);

  if (a.checked){
    qcard.appendChild(el('div', {class:'exp-box'}, [
      el('b', {}, a.selected === q.ans ? '✓ CORRECT — EXPLANATION' : '✕ WRONG — EXPLANATION'),
      el('p', {style:'margin:6px 0 0;'}, q.exp)
    ]));
  }
  wrap.appendChild(qcard);

  const actions = el('div', {class:'quiz-actions'});
  if (!a.checked){
    actions.appendChild(el('button', {
      class:'btn btn-copper btn-block',
      disabled: a.selected == null,
      onClick: () => checkAnswer()
    }, 'Check answer'));
  } else {
    actions.appendChild(el('button', {
      class:'btn btn-ghost btn-block',
      onClick: () => nextQuestion()
    }, STATE.idx === STATE.questions.length - 1 ? 'Finish topic' : 'Next question →'));
  }
  wrap.appendChild(actions);

  const answeredCount = STATE.answers.filter(x => x.checked).length;
  if (answeredCount > 0){
    wrap.appendChild(el('div', {class:'sticky-submit'},
      el('button', {class:'btn btn-primary btn-block', onClick:() => finishTopic()},
        'Submit & see results  (' + answeredCount + '/' + STATE.questions.length + ' attempted)')
    ));
  }

  return wrap;
}

function checkAnswer(){
  const q = STATE.questions[STATE.idx];
  const a = STATE.answers[STATE.idx];
  a.checked = true;
  a.correct = (a.selected === q.ans);
  a.timeSec = STATE.elapsedSec;
  clearInterval(STATE.timerHandle);
  render();
}

function nextQuestion(){
  if (STATE.idx < STATE.questions.length - 1){
    STATE.idx++;
    render();
    startQuestionTimer();
  } else {
    finishTopic();
  }
}

function finishTopic(){
  clearInterval(STATE.timerHandle);
  const attempted = STATE.answers.filter(a => a.checked);
  const correct = attempted.filter(a => a.correct).length;
  const wrong = attempted.length - correct;
  const marks = (correct * 1) - (wrong * 0.25);

  const byLevel = {Easy:{c:0,t:0}, Medium:{c:0,t:0}, Hard:{c:0,t:0}};
  const byTag = {PYQ:{c:0,t:0}, CONCEPT:{c:0,t:0}};
  STATE.questions.forEach((q,i) => {
    const a = STATE.answers[i];
    if (!a.checked) return;
    byLevel[q.level].t++; if (a.correct) byLevel[q.level].c++;
    const key = q.tag.indexOf('PYQ')>-1 ? 'PYQ' : 'CONCEPT';
    byTag[key].t++; if (a.correct) byTag[key].c++;
  });

  const entry = {
    topicId: STATE.topic.id,
    topicName: STATE.topic.name,
    date: new Date().toISOString(),
    attempted: attempted.length,
    total: STATE.questions.length,
    correct, wrong, marks,
    accuracy: attempted.length ? Math.round((correct/attempted.length)*100) : 0,
    byLevel, byTag,
    avgTime: attempted.length ? Math.round(attempted.reduce((s,a)=>s+a.timeSec,0)/attempted.length) : 0
  };
  saveHistoryEntry(entry);
  STATE._lastResult = entry;
  STATE.screen = 'results';
  render();
}

/* ============================================================
   RESULTS SCREEN
   ============================================================ */
function ResultsScreen(){
  const r = STATE._lastResult;
  const wrap = el('div', {});

  wrap.appendChild(el('div', {class:'score-hero'}, [
    el('div', {class:'big'}, r.marks.toFixed(2)),
    el('div', {class:'sub'}, 'marks scored · ' + r.topicName + ' · ' + r.accuracy + '% accuracy'),
    el('div', {class:'stat-row'}, [
      el('div', {class:'stat-box'}, [el('div', {class:'n'}, r.correct), el('div', {class:'l'}, 'CORRECT')]),
      el('div', {class:'stat-box'}, [el('div', {class:'n'}, r.wrong), el('div', {class:'l'}, 'WRONG (−0.25)')]),
      el('div', {class:'stat-box'}, [el('div', {class:'n'}, r.attempted+'/'+r.total), el('div', {class:'l'}, 'ATTEMPTED')])
    ])
  ]));

  // difficulty breakdown
  const diffPanel = el('div', {class:'panel'});
  diffPanel.appendChild(el('h3', {}, 'Difficulty breakdown'));
  ['Easy','Medium','Hard'].forEach(lv => {
    const d = r.byLevel[lv];
    const pct = d.t ? Math.round((d.c/d.t)*100) : 0;
    diffPanel.appendChild(el('div', {class:'bar-row'}, [
      el('span', {class:'lbl'}, lv),
      el('div', {class:'bar-track'}, el('div', {class:'bar-fill', style:'width:'+pct+'%;background:'+(pct>=70?'var(--go)':pct>=40?'var(--warn)':'var(--bad)')})),
      el('span', {class:'val'}, d.t ? d.c+'/'+d.t : '—')
    ]));
  });
  wrap.appendChild(diffPanel);

  // tag breakdown
  const tagPanel = el('div', {class:'panel'});
  tagPanel.appendChild(el('h3', {}, 'PYQ vs Concept breakdown'));
  [['PYQ','PYQ (repeat pattern)'],['CONCEPT','Concept / gap-fill']].forEach(([key,label]) => {
    const d = r.byTag[key];
    const pct = d.t ? Math.round((d.c/d.t)*100) : 0;
    tagPanel.appendChild(el('div', {class:'bar-row'}, [
      el('span', {class:'lbl'}, label),
      el('div', {class:'bar-track'}, el('div', {class:'bar-fill', style:'width:'+pct+'%;background:var(--copper)'})),
      el('span', {class:'val'}, d.t ? d.c+'/'+d.t : '—')
    ]));
  });
  wrap.appendChild(tagPanel);

  // per-question time bar chart
  const timePanel = el('div', {class:'panel'});
  timePanel.appendChild(el('h3', {}, 'Time per question'));
  const timeChart = el('div', {style:'display:flex;align-items:flex-end;gap:3px;height:60px;'});
  STATE.answers.forEach((a,i) => {
    const h = a.checked ? Math.min(100, (a.timeSec/90)*100) : 4;
    timeChart.appendChild(el('div', {
      title: 'Q'+(i+1)+': '+a.timeSec+'s',
      style:'flex:1;min-width:3px;height:'+Math.max(h,4)+'%;border-radius:2px 2px 0 0;background:'+(a.checked ? (a.correct?'var(--go)':'var(--bad)') : 'var(--line)')
    }));
  });
  timePanel.appendChild(timeChart);
  timePanel.appendChild(el('p', {style:'font-size:11px;color:var(--ink-soft);margin:8px 0 0;font-family:var(--mono);'}, 'avg time: ' + r.avgTime + 's/question'));
  wrap.appendChild(timePanel);

  // smart suggestions (5 dimensions)
  wrap.appendChild(SuggestionsPanel(r));

  // wrong answer review
  const wrongIdx = STATE.answers.map((a,i)=>({a,i})).filter(x => x.a.checked && !x.a.correct);
  if (wrongIdx.length){
    const revPanel = el('div', {class:'panel'});
    revPanel.appendChild(el('h3', {}, 'Review wrong answers (' + wrongIdx.length + ')'));
    wrongIdx.forEach(({a,i}) => {
      const q = STATE.questions[i];
      revPanel.appendChild(el('div', {class:'review-item'}, [
        el('p', {class:'review-q'}, 'Q'+(i+1)+'. ' + q.q),
        el('div', {class:'review-meta'}, [
          el('span', {class:'r-wrong'}, 'Your answer: ' + q.opts[a.selected]),
          el('span', {class:'r-right'}, 'Correct: ' + q.opts[q.ans])
        ])
      ]));
    });
    wrap.appendChild(revPanel);
  }

  const actions = el('div', {class:'result-actions'});
  actions.appendChild(el('button', {class:'btn btn-ghost', onClick:() => startTopic(STATE.topic)}, 'Retry'));
  actions.appendChild(el('button', {class:'btn btn-ghost', onClick:() => { STATE.screen='home'; render(); }}, 'New topic'));
  actions.appendChild(el('button', {class:'btn btn-primary', onClick:() => { STATE.screen='history'; render(); }}, 'History'));
  wrap.appendChild(actions);

  return wrap;
}

function SuggestionsPanel(r){
  const suggestions = [];
  // 1. Accuracy dimension
  if (r.accuracy < 50) suggestions.push({c:'var(--bad)', t:'Accuracy below 50% — re-read the concept notes for ' + r.topicName + ' before attempting more questions.'});
  else if (r.accuracy < 75) suggestions.push({c:'var(--warn)', t:'Decent grip, but push accuracy above 75% by revisiting the questions you got wrong.'});
  else suggestions.push({c:'var(--go)', t:'Strong accuracy (' + r.accuracy + '%) — you\'re ready to move to the next high-yield topic.'});
  // 2. Speed dimension
  if (r.avgTime > 75) suggestions.push({c:'var(--bad)', t:'Average ' + r.avgTime + 's/question is too slow for a 2-hour, 200-question paper — drill formulas until recall is instant.'});
  else if (r.avgTime > 50) suggestions.push({c:'var(--warn)', t:'Speed is acceptable but tighten it — aim for under 50s/question with practice.'});
  else suggestions.push({c:'var(--go)', t:'Excellent pace at ' + r.avgTime + 's/question — well within exam timing limits.'});
  // 3. Difficulty dimension
  const hard = r.byLevel.Hard;
  if (hard.t && (hard.c/hard.t) < 0.5) suggestions.push({c:'var(--warn)', t:'Hard numericals are your weak spot here — practice the derivation steps, not just the final formula.'});
  // 4. Tag dimension (repeat-pattern priority)
  const pyq = r.byTag.PYQ;
  if (pyq.t && (pyq.c/pyq.t) < 0.6) suggestions.push({c:'var(--bad)', t:'You missed several PYQ-pattern questions — these repeat almost every year, so revise these first.'});
  // 5. Coverage dimension
  if (r.attempted < r.total) suggestions.push({c:'var(--warn)', t:'You left ' + (r.total-r.attempted) + ' question(s) unattempted — come back and finish the full set for a true score.'});
  else suggestions.push({c:'var(--go)', t:'Full set attempted — this score is a true reading of your readiness on this topic.'});

  const panel = el('div', {class:'panel'});
  panel.appendChild(el('h3', {}, 'Smart suggestions'));
  suggestions.forEach(s => {
    panel.appendChild(el('div', {class:'suggest-item'}, [
      el('span', {class:'suggest-dot', style:'background:'+s.c}),
      el('span', {}, s.t)
    ]));
  });
  return panel;
}

/* ============================================================
   HISTORY SCREEN
   ============================================================ */
function HistoryScreen(){
  const wrap = el('div', {});
  wrap.appendChild(el('button', {class:'back-link', onClick:() => { STATE.screen='home'; render(); }}, '← Back to topics'));
  wrap.appendChild(el('div', {class:'section-label'}, 'Performance history'));

  const hist = loadHistory().slice().reverse();
  if (!hist.length){
    wrap.appendChild(el('div', {class:'empty-state'}, [
      el('div', {class:'glyph'}, '📈'),
      el('p', {}, 'No attempts yet. Finish a topic to see your trend here.')
    ]));
    return wrap;
  }

  const panel = el('div', {class:'panel'});
  hist.slice(0, 30).forEach(h => {
    const d = new Date(h.date);
    panel.appendChild(el('div', {class:'hist-row'}, [
      el('div', {class:'hist-info'}, [
        el('div', {class:'hist-topic'}, h.topicName),
        el('div', {class:'hist-date'}, d.toLocaleDateString() + ' · ' + h.correct + '/' + h.attempted + ' correct · ' + h.accuracy + '%')
      ]),
      Sparkline(h.topicId),
      el('div', {class:'hist-score', style:'color:'+(h.accuracy>=75?'var(--go)':h.accuracy>=50?'var(--warn)':'var(--bad)')}, h.marks.toFixed(1))
    ]));
  });
  wrap.appendChild(panel);
  return wrap;
}

function Sparkline(topicId){
  const points = loadHistory().filter(h => h.topicId === topicId).map(h => h.accuracy);
  if (points.length < 2) return el('span', {style:'width:70px;display:inline-block;'});
  const w = 70, h = 26, max = 100, min = 0;
  const step = w / (points.length - 1);
  const path = points.map((p,i) => (i*step) + ',' + (h - ((p-min)/(max-min))*h)).join(' ');
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 '+w+' '+h);
  svg.setAttribute('class','spark');
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polyline');
  poly.setAttribute('points', path);
  poly.setAttribute('fill','none');
  poly.setAttribute('stroke','var(--copper)');
  poly.setAttribute('stroke-width','2');
  poly.setAttribute('stroke-linecap','round');
  poly.setAttribute('stroke-linejoin','round');
  svg.appendChild(poly);
  return svg;
}

/* ============================================================
   INIT
   ============================================================ */
render();
</script>
